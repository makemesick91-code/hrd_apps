version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: daengtisia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: daengtisia_hr
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - daengtisia_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d daengtisia_hr"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: daengtisia_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - daengtisia_network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # DB Migration + Seed (runs once, then exits)
  db-migrate:
    image: node:20-alpine
    container_name: daengtisia_migrate
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/daengtisia_hr
    command: sh -c "npm install && npx prisma db push --skip-generate && npx tsx prisma/seed.ts"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - daengtisia_network
    profiles:
      - setup

  # Next.js Application (Production)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: daengtisia_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/daengtisia_hr
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - daengtisia_network
    profiles:
      - prod

volumes:
  postgres_data:
  redis_data:

networks:
  daengtisia_network:
    driver: bridge
